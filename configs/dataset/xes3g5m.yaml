# XES3G5M — K-12 math KT. 7,652 questions, 865 KCs, ~5.55M interactions, 18,066 learners.
# On AutoDL we source it from HuggingFace (hf-mirror): interaction sequences +
# the authors' precomputed 768-d RoBERTa question embeddings (semantic signal).
# Raw Chinese question text is optional (Drive-only); supply questions.json to
# additionally enable the LLM attribute/option teacher.
dataset:
  name: xes3g5m
  has_options: true
  max_seq_len: 200
teacher:
  # authors' precomputed embeddings are 768-d; use --precomputed-emb auto to load them.
  embed_dim: 768
  # only used if you supply questions.json and run the LLM teacher on raw text:
  embedder: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  num_option_labels: 4
model:
  num_kcs: null

# SLIM-KT default configuration. Override per-dataset in configs/dataset/*.yaml
# and per-run on the CLI, e.g.:  python -m slimkt.train --config configs/default.yaml \
#   --set dataset=eedi model.lambda_opt=0.5

seed: 42

paths:
  data_root: ${env:DATA_ROOT:/root/autodl-tmp/slimkt_data}
  teacher_cache: ${paths.data_root}/teacher_cache
  output_dir: ${env:OUTPUT_ROOT:/root/autodl-tmp/slimkt_runs}

dataset:
  name: eedi                # eedi | ednet | assist2009 | assist2017 | junyi
  max_seq_len: 200
  min_seq_len: 3
  num_folds: 5              # pyKT-style 5-fold CV
  fold: 0
  batch_size: 64
  num_workers: 4
  has_options: true         # multiple-choice datasets enable option-weight distillation

cold_start:
  enabled: true
  new_item_frac: 0.2        # fraction of items held out as "new" (unseen at train)
  rho: 0.001                # extreme few-shot: fraction of a new item's responses visible at train

teacher:
  # semantic embedding
  embedder: sentence-transformers/all-MiniLM-L6-v2
  embed_dim: 384
  # LLM used for attribute / option-weight extraction (OpenAI-compatible endpoint)
  llm_model: Qwen2.5-7B-Instruct
  llm_base_url: ${env:OPENAI_BASE_URL:http://127.0.0.1:8000/v1}
  llm_api_key: ${env:OPENAI_API_KEY:EMPTY}
  attributes:               # scalar (regression) vs categorical (soft-label) attributes
    difficulty: scalar      # in [0,1]
    required_kcs: multilabel
    misconceptions: multilabel
  num_option_labels: 4      # TCOW-style ordinal labels, e.g. inadequate..adequate
  max_new_tokens: 512
  request_concurrency: 8

model:
  arch: slimkt              # slimkt (semantic student) | dkt | dkvmn | akt (ID baselines)
  backbone: sakt            # sakt | akt  (only used by the slimkt student)
  sem_override_path: null   # optional .npy to replace teacher_sem (resolution sweep)
  d_model: 128
  n_heads: 8
  n_blocks: 2
  dropout: 0.2
  num_kcs: null             # filled from dataset stats
  use_semantic: true        # use distilled LLM semantics for the item representation
  use_id_embedding: false   # false => ID-free (cold-start-ready); true => adds a learnable ID
  # distillation loss weights (combined loss)
  lambda_sem: 1.0
  lambda_attr: 0.5
  lambda_opt: 0.5
  distill_temperature: 2.0

train:
  run_name: null            # appended to the output dir; set per-variant to avoid overwrites
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-5
  grad_clip: 1.0
  early_stop_patience: 10
  amp: true                 # mixed precision on GPU
  eval_every: 1
  monitor: val_auc          # checkpoint on best val AUC

eval:
  benchmark_efficiency: true  # measure inference latency + peak GPU memory
  latency_warmup: 20
  latency_iters: 200
  interpretability: true      # attention export + LIME
